media:
  shows_path: /mnt/nas/Shows
  movies_path: /mnt/nas/Movies
  # Glob patterns for files/dirs to skip during scanning.
  # Hidden dirs (starting with .) are always skipped automatically.
  # Patterns are matched against the full path and the filename.
  ignore_patterns:
    - "*.sample.*"
    - "*-sample.*"

server:
  host: 0.0.0.0
  port: 8080
  host_ip: 192.168.1.100    # LAN IP of this machine — used in stream/EPG URLs
  # /dev/shm is always tmpfs and user-writable (good for dev/manual runs).
  # When running as a systemd service, RuntimeDirectory=fakeiptv in the unit
  # file creates /run/fakeiptv owned by the service user — set that here instead.
  tmp_dir: /dev/shm/fakeiptv
  subtitles: true          # Include subtitle tracks (SRT/ASS→WebVTT). Set false to disable.
  catchup_days: 7          # Days of past programming available for catch-up. Set 0 to disable.

metadata:
  tmdb_api_key: ""          # Optional — leave empty to use NFO files only
  cache_dir: ~/.fakeiptv/
  # Optional Sonarr/Radarr integration — metadata only, paths are ignored
  sonarr_url: ""            # e.g. http://192.168.1.x:8989
  sonarr_api_key: ""
  radarr_url: ""            # e.g. http://192.168.1.x:7878
  radarr_api_key: ""

channels:
  # Channels auto-discovered (no per-show channels — every channel is a curated mix):
  #   primetime       — all shows interleaved
  #   {genre}         — per-genre mix (e.g. drama, comedy) if ≥ 2 shows share the genre
  #   goldies         — shows with year < goldies_before
  #   hits            — shows with rating ≥ hits_rating (from Sonarr/Radarr/TMDB/NFO)
  #   movies          — all movies
  #   {genre}-movies  — genre movie mix if ≥ 3 movies share the genre

  goldies_before: 2010   # shows older than this year appear in "Goldies"
  hits_rating: 8.0       # minimum rating (0–10 scale) for "Hits"

  # Optional: disable channels by slug
  # disabled:
  #   - drama
  #   - goldies
  #
  # Optional: rename a channel (slug: New Name)
  # rename:
  #   primetime: Prime Time
  #   hits: Hall of Fame
