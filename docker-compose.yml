services:
  fakeiptv:
    build: .
    container_name: fakeiptv
    restart: unless-stopped
    ports:
      - "${FAKEIPTV_PORT:-8080}:${FAKEIPTV_PORT:-8080}"
    env_file:
      - .env
    volumes:
      # ── Media — choose ONE option ─────────────────────────────────────────────
      #
      # Option A: Linux / Raspberry Pi
      # NAS is already mounted on the host (e.g. via /etc/fstab or autofs).
      # Set FAKEIPTV_SHOWS_PATH and FAKEIPTV_MOVIES_PATH in .env to the host paths.
      - ${FAKEIPTV_SHOWS_PATH}:/shows:ro
      - ${FAKEIPTV_MOVIES_PATH}:/movies:ro
      #
      # Option B: Windows (Docker mounts the NAS share directly via CIFS)
      # Comment out the two Option A lines above and uncomment the line below.
      # Configure the nas_multimedia named volume at the bottom of this file.
      # - nas_multimedia:/multimedia:ro
      #
      # ─────────────────────────────────────────────────────────────────────────
      # Persistent metadata cache — relative path works on both Linux and Windows
      - ./fakeiptv-cache:/cache
      # HLS segments — tmpfs so segments live in RAM, not on disk
      - type: tmpfs
        target: /tmp/fakeiptv
        tmpfs:
          size: ${FAKEIPTV_TMPFS_SIZE:-1073741824}   # 1 GB default; raise if you have many channels
    environment:
      # ── In-container media paths ──────────────────────────────────────────────
      # Option A (bind mounts — /shows and /movies):
      FAKEIPTV_SHOWS_PATH: /shows
      FAKEIPTV_MOVIES_PATH: /movies
      # Option B (CIFS — comment out the two lines above and uncomment these):
      # FAKEIPTV_SHOWS_PATH: /multimedia/TV Shows
      # FAKEIPTV_MOVIES_PATH: /multimedia/Movies
      # ─────────────────────────────────────────────────────────────────────────
      FAKEIPTV_TMP_DIR: /tmp/fakeiptv
      FAKEIPTV_CACHE_DIR: /cache
      # Timezone — must match the host so the schedule epoch and EPG times are correct.
      # Set TZ in .env (e.g. TZ=Asia/Jerusalem) or hardcode here.
      TZ: ${TZ:-Asia/Jerusalem}
      FAKEIPTV_PREWARM: ${FAKEIPTV_PREWARM:-false}
      FAKEIPTV_PREWARM_TIMEOUT: ${FAKEIPTV_PREWARM_TIMEOUT:-120}
      FAKEIPTV_READY_SEGMENTS: ${FAKEIPTV_READY_SEGMENTS:-3}

# ── Option B: CIFS named volume (Windows / NAS direct mount) ──────────────────
# Uncomment this entire block if using Option B above.
# Adjust addr, device, and credentials to match your NAS.
